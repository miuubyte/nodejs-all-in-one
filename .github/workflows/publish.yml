name: Publish All-in-One Node.js

on:
  push:
    branches: [ "main" ]
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  get-versions:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      latest: ${{ steps.set-matrix.outputs.latest }}
    steps:
      - id: set-matrix
        run: |
          DATA=$(curl -s https://nodejs.org/dist/index.json)
          VERSIONS=$(echo $DATA | jq -c '[.[] | .version | capture("v(?<major>\\d+)") | .major | tonumber] | unique | sort')
          LATEST=$(echo $DATA | jq -r '.[0].version | capture("v(?<major>\\d+)") | .major')
          echo "matrix=$VERSIONS" >> $GITHUB_OUTPUT
          echo "latest=$LATEST" >> $GITHUB_OUTPUT

  build-and-push:
    needs: get-versions
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 1
      matrix:
        node-version: ${{ fromJson(needs.get-versions.outputs.matrix) }}
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract full version
        id: meta
        run: |
          FULL=$(curl -s https://nodejs.org/dist/index.json | jq -r --arg major "${{ matrix.node-version }}" '.[] | select(.version | startswith("v"+$major+".")) | .version' | head -n 1 | sed 's/v//')
          echo "full=$FULL" >> $GITHUB_OUTPUT

      - name: Build Standard
        uses: docker/build-push-action@v5
        with:
          context: .
          build-args: NODE_VERSION=${{ matrix.node-version }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ matrix.node-version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.full }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ matrix.node-version }}-alpine

      - name: Build Dev-Kit
        uses: docker/build-push-action@v5
        with:
          context: .
          build-args: |
            NODE_VERSION=${{ matrix.node-version }}
            DEV_MODE=true
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ matrix.node-version }}-dev
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.full }}-dev

  tag-latest:
    needs: [get-versions, build-and-push]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push latest
        uses: docker/build-push-action@v5
        with:
          context: .
          build-args: NODE_VERSION=${{ needs.get-versions.outputs.latest }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest-alpine

  update-assets:
    needs: get-versions
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Update Dockerfile and README
        run: |
          LATEST='${{ needs.get-versions.outputs.latest }}'
          sed -i "s/ARG NODE_VERSION=.*/ARG NODE_VERSION=$LATEST/" Dockerfile
          git config --global user.name "miuubyte"
          git config --global user.email "miuudev@gmail.com"
          git add Dockerfile
          git commit -m "chore: auto-update Dockerfile [skip ci]" || exit 0
          git push

  cleanup:
    needs: [tag-latest, update-assets]
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - name: Deep Cleanup
        run: |
          PACKAGE_NAME=${{ github.event.repository.name }}
          for page in {1..5}; do
            VERSIONS=$(curl -s -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              -H "Accept: application/vnd.github.v3+json" \
              "https://api.github.com/users/${{ github.repository_owner }}/packages/container/$PACKAGE_NAME/versions?per_page=100&page=$page")
            if [ "$(echo "$VERSIONS" | jq '. | length')" -eq 0 ]; then break; fi
            echo "$VERSIONS" | jq -c '.[]' | while read -r version; do
              id=$(echo "$version" | jq -r '.id')
              tags=$(echo "$version" | jq -r '.metadata.container.tags')
              if [ "$tags" == "null" ] || [ "$tags" == "[]" ]; then
                curl -s -X DELETE -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
                  "https://api.github.com/users/${{ github.repository_owner }}/packages/container/$PACKAGE_NAME/versions/$id"
              fi
            done
          done
