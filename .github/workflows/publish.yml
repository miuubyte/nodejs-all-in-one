name: Publish All-in-One Node.js

on:
  push:
    branches: [ "main" ]
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  get-versions:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      latest: ${{ steps.set-matrix.outputs.latest }}
    steps:
      - id: set-matrix
        run: |
          DATA=$(curl -s https://nodejs.org/dist/index.json)
          # Get unique major versions for all LTS releases and the absolute latest release
          VERSIONS=$(echo $DATA | jq -c '[.[] | select(.lts != false) | .version | capture("v(?<major>\\d+)") | .major | tonumber] + [(.[0].version | capture("v(?<major>\\d+)") | .major | tonumber)] | unique | sort')
          LATEST=$(echo $DATA | jq -r '.[0].version | capture("v(?<major>\\d+)") | .major')
          echo "matrix=$VERSIONS" >> $GITHUB_OUTPUT
          echo "latest=$LATEST" >> $GITHUB_OUTPUT

  build-and-push:
    needs: get-versions
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 1
      matrix:
        node-version: ${{ fromJson(needs.get-versions.outputs.matrix) }}
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          build-args: |
            NODE_VERSION=${{ matrix.node-version }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ matrix.node-version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ matrix.node-version }}-alpine

  tag-latest:
    needs: [get-versions, build-and-push]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push latest
        uses: docker/build-push-action@v5
        with:
          context: .
          build-args: |
            NODE_VERSION=${{ needs.get-versions.outputs.latest }}
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

  update-readme:
    needs: get-versions
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Generate README
        run: |
          VERSIONS='${{ needs.get-versions.outputs.matrix }}'
          LATEST='${{ needs.get-versions.outputs.latest }}'
          REPO="${{ github.repository }}"
          
          echo "# Node.js All-in-One Container 🚀" > README.md
          echo "![GitHub Workflow Status](https://img.shields.io/github/actions/workflow/status/$REPO/publish.yml?branch=main&style=for-the-badge) ![GitHub Package](https://img.shields.io/badge/Container-GHCR-blue?style=for-the-badge&logo=docker)" >> README.md
          echo "" >> README.md
          echo "Multi-version Docker containers for Node.js (Alpine Linux). Automatically updated and optimized." >> README.md
          echo "" >> README.md
          echo "## 📦 Supported Versions" >> README.md
          echo "" >> README.md
          echo "| Node.js Version | Container Image Tag | Status |" >> README.md
          echo "| :--- | :--- | :--- |" >> README.md
          
          # Convert JSON array to list and sort descending for README
          echo $VERSIONS | jq -r '.[]' | sort -rn | while read v; do
            STATUS="Stable"
            if [ "$v" == "$LATEST" ]; then STATUS="**Latest** 🌟"; fi
            echo "| **Node.js $v** | \`ghcr.io/$REPO:$v\` | $STATUS |" >> README.md
          done
          
          echo "" >> README.md
          echo "## 🚀 Quick Usage" >> README.md
          echo "\`\`\`bash" >> README.md
          echo "docker pull ghcr.io/$REPO:latest" >> README.md
          echo "\`\`\`" >> README.md
          echo "" >> README.md
          echo "---" >> README.md
          echo "*This README is automatically updated by GitHub Actions.*" >> README.md
          
          git config --global user.name "miuubyte"
          git config --global user.email "miuudev@gmail.com"
          git add README.md
          git commit -m "docs: update version table in README [skip ci]" || exit 0
          git push

  cleanup:
    needs: [tag-latest, update-readme]
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - name: Delete all untagged versions
        run: |
          PACKAGE_NAME=${{ github.event.repository.name }}
          echo "Running deep cleanup for $PACKAGE_NAME..."
          
          # Use a loop to handle potential large number of versions and ensure GITHUB_TOKEN has permission
          for page in {1..3}; do
            VERSIONS=$(curl -s -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              -H "Accept: application/vnd.github.v3+json" \
              "https://api.github.com/users/${{ github.repository_owner }}/packages/container/$PACKAGE_NAME/versions?per_page=100&page=$page")
            
            # If no versions found, break
            if [ "$(echo "$VERSIONS" | jq '. | length')" -eq 0 ]; then break; fi
            
            echo "$VERSIONS" | jq -c '.[]' | while read -r version; do
              id=$(echo "$version" | jq -r '.id')
              tags=$(echo "$version" | jq -r '.metadata.container.tags')
              
              if [ "$tags" == "null" ] || [ "$tags" == "[]" ] || [ -z "$tags" ]; then
                echo "Deleting untagged version ID: $id"
                curl -s -X DELETE -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
                  -H "Accept: application/vnd.github.v3+json" \
                  "https://api.github.com/users/${{ github.repository_owner }}/packages/container/$PACKAGE_NAME/versions/$id"
              fi
            done
          done
          echo "Deep cleanup complete."
