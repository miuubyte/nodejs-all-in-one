name: Publish All-in-One Node.js

on:
  push:
    branches: [ "main" ]
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  get-versions:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      latest: ${{ steps.set-matrix.outputs.latest }}
    steps:
      - id: set-matrix
        run: |
          DATA=$(curl -s https://nodejs.org/dist/index.json)
          MAJORS=$(echo $DATA | jq -c '[.[] | .version | capture("v(?<major>\\d+)") | .major | tonumber | select(. > 0)] | unique | sort')
          VERSIONS=$(echo $MAJORS | jq -c '["0.10", "0.12"] + .')
          LATEST=$(echo $DATA | jq -r '.[0].version | capture("v(?<major>\\d+)") | .major')
          echo "matrix=$VERSIONS" >> $GITHUB_OUTPUT
          echo "latest=$LATEST" >> $GITHUB_OUTPUT

  cleanup-before:
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - name: Aggressive Registry Cleanup
        run: |
          PACKAGE_NAME=${{ github.event.repository.name }}
          echo "🧹 Starting aggressive pre-build cleanup for $PACKAGE_NAME..."
          for page in {1..5}; do
            VERSIONS=$(curl -s -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              "https://api.github.com/users/${{ github.repository_owner }}/packages/container/$PACKAGE_NAME/versions?per_page=100&page=$page")
            if [ -z "$VERSIONS" ] || [ "$(echo "$VERSIONS" | jq '. | length')" -eq 0 ]; then break; fi
            echo "$VERSIONS" | jq -c '.[]' | while read -r version; do
              id=$(echo "$version" | jq -r '.id')
              tags=$(echo "$version" | jq -r '.metadata.container.tags')
              if [ "$tags" == "null" ] || [ "$tags" == "[]" ]; then
                echo "🗑️ Deleting orphaned SHA digest: $id"
                curl -s -X DELETE -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
                  "https://api.github.com/users/${{ github.repository_owner }}/packages/container/$PACKAGE_NAME/versions/$id"
              fi
            done
          done || echo "Registry is already clean."

  build-and-push:
    needs: [get-versions, cleanup-before]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        node-version: ${{ fromJson(needs.get-versions.outputs.matrix) }}
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract full version
        id: meta
        run: |
          V="${{ matrix.node-version }}"
          DATA=$(curl -s https://nodejs.org/dist/index.json)
          if [[ "$V" == "0.10" || "$V" == "0.12" ]]; then
            FULL=$(echo $DATA | jq -r --arg prefix "v$V." '.[] | select(.version | startswith($prefix)) | .version' | head -n 1 | sed 's/v//')
          else
            FULL=$(echo $DATA | jq -r --arg major "v$V." '.[] | select(.version | startswith($major)) | .version' | head -n 1 | sed 's/v//')
          fi
          echo "full=$FULL" >> $GITHUB_OUTPUT

      - name: Determine Base Image and Suffix
        id: base
        run: |
          V=$(echo "${{ matrix.node-version }}" | xargs)
          FULL="${{ steps.meta.outputs.full }}"
          case $V in
            0.10|0.12|5|7|9)
              echo "img=node:$FULL-slim" >> $GITHUB_OUTPUT
              echo "suffix=slim" >> $GITHUB_OUTPUT
              ;;
            *)
              if [ "$V" -lt 4 ]; then
                echo "img=node:$FULL-slim" >> $GITHUB_OUTPUT
                echo "suffix=slim" >> $GITHUB_OUTPUT
              else
                echo "img=node:$V-alpine" >> $GITHUB_OUTPUT
                echo "suffix=alpine" >> $GITHUB_OUTPUT
              fi
              ;;
          esac

      - name: Check Dev-Kit Eligibility
        id: devkit
        run: |
          V=$(echo "${{ matrix.node-version }}" | xargs)
          MAJOR=$(echo "$V" | cut -d. -f1)
          if [ "$MAJOR" -ge 18 ]; then
            echo "build=true" >> $GITHUB_OUTPUT
          else
            echo "build=false" >> $GITHUB_OUTPUT
          fi

      - name: Build and Push (Grouped Tags)
        uses: docker/build-push-action@v5
        with:
          context: .
          build-args: |
            BASE_IMAGE=${{ steps.base.outputs.img }}
          push: true
          provenance: false
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ matrix.node-version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.full }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ matrix.node-version }}-${{ steps.base.outputs.suffix }}

      - name: Build and Push Dev-Kit (Grouped Tags)
        if: steps.devkit.outputs.build == 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          build-args: |
            BASE_IMAGE=${{ steps.base.outputs.img }}
            DEV_MODE=true
          push: true
          provenance: false
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ matrix.node-version }}-dev
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.full }}-dev
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ matrix.node-version }}-${{ steps.base.outputs.suffix }}-dev

  tag-latest:
    needs: [get-versions, build-and-push]
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push latest
        uses: docker/build-push-action@v5
        with:
          context: .
          build-args: |
            BASE_IMAGE=node:${{ needs.get-versions.outputs.latest }}-alpine
          push: true
          provenance: false
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest-alpine

  update-assets:
    needs: [get-versions, build-and-push]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Update README and Dockerfile
        run: |
          VERSIONS='${{ needs.get-versions.outputs.matrix }}'
          LATEST='${{ needs.get-versions.outputs.latest }}'
          COUNT=$(echo $VERSIONS | jq '. | length')
          REPO="${{ github.repository }}"
          
          sed -i "s|ARG BASE_IMAGE=.*|ARG BASE_IMAGE=node:$LATEST-alpine|" Dockerfile
          
          echo "# Node.js All-in-One Container 🚀" > README.md
          echo "![Status](https://img.shields.io/github/actions/workflow/status/$REPO/publish.yml?branch=main&style=for-the-badge) ![Versions](https://img.shields.io/badge/Node.js-$LATEST-Versions-blue?style=for-the-badge&logo=node.js) ![Security](https://img.shields.io/badge/Security-Trivy_Passed-green?style=for-the-badge&logo=armosecurity)" >> README.md
          echo "" >> README.md
          echo "The ultimate 'Evergreen' registry for Node.js. Automatically maintained, scanned, and updated. From legacy **v0.10** to modern **v25+**." >> README.md
          echo "" >> README.md
          echo "## 🏷️ Tags Structure" >> README.md
          echo "| Version | Standard Tags | Dev-Kit Tags (v18+) | Base OS |" >> README.md
          echo "| :--- | :--- | :--- | :--- |" >> README.md
          echo $VERSIONS | jq -r '.[]' | sort -rn | while read v; do
            OS="Alpine"
            SUFFIX="alpine"
            if [[ "$v" == "0.10" || "$v" == "0.12" || "$v" == "5" || "$v" == "7" || "$v" == "9" ]]; then OS="Slim (Debian)"; SUFFIX="slim"; fi
            STD="\`$v\`, \`$v-$SUFFIX\`"
            DEVKIT="N/A"
            MAJOR=$(echo "$v" | cut -d. -f1)
            if [ "$MAJOR" -ge 18 ]; then DEVKIT="\`$v-dev\`, \`$v-$SUFFIX-dev\` ✅"; fi
            echo "| **Node.js $v** | $STD | $DEVKIT | $OS |" >> README.md
          done
          
          git config --global user.name "miuubyte"
          git config --global user.email "miuudev@gmail.com"
          git add README.md Dockerfile
          git commit -m "chore: sync assets and latest base [skip ci]" -m "Co-authored-by: yemobyte <248470968+yemobyte@users.noreply.github.com>" || exit 0
          git push

  cleanup-final:
    needs: [tag-latest, update-assets]
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - name: Aggressive Registry Cleanup
        run: |
          PACKAGE_NAME=${{ github.event.repository.name }}
          echo "🧹 Starting aggressive post-build cleanup for $PACKAGE_NAME..."
          for page in {1..5}; do
            VERSIONS=$(curl -s -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              "https://api.github.com/users/${{ github.repository_owner }}/packages/container/$PACKAGE_NAME/versions?per_page=100&page=$page")
            if [ -z "$VERSIONS" ] || [ "$(echo "$VERSIONS" | jq '. | length')" -eq 0 ]; then break; fi
            echo "$VERSIONS" | jq -c '.[]' | while read -r version; do
              id=$(echo "$version" | jq -r '.id')
              tags=$(echo "$version" | jq -r '.metadata.container.tags')
              if [ "$tags" == "null" ] || [ "$tags" == "[]" ]; then
                echo "🗑️ Deleting orphaned SHA digest: $id"
                curl -s -X DELETE -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
                  "https://api.github.com/users/${{ github.repository_owner }}/packages/container/$PACKAGE_NAME/versions/$id"
              fi
            done
          done || echo "Cleanup complete."
