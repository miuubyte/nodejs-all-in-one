name: Publish All-in-One Node.js

on:
  push:
    branches: [ "main" ]
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  get-versions:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      latest: ${{ steps.set-matrix.outputs.latest }}
    steps:
      - id: set-matrix
        run: |
          DATA=$(curl -s https://nodejs.org/dist/index.json)
          # Get unique major versions for all LTS releases and the absolute latest release
          VERSIONS=$(echo $DATA | jq -c '[.[] | select(.lts != false) | .version | capture("v(?<major>\\d+)") | .major | tonumber] + [(.[0].version | capture("v(?<major>\\d+)") | .major | tonumber)] | unique | sort')
          LATEST=$(echo $DATA | jq -r '.[0].version | capture("v(?<major>\\d+)") | .major')
          echo "matrix=$VERSIONS" >> $GITHUB_OUTPUT
          echo "latest=$LATEST" >> $GITHUB_OUTPUT

  build-and-push:
    needs: get-versions
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ${{ fromJson(needs.get-versions.outputs.matrix) }}
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          build-args: |
            NODE_VERSION=${{ matrix.node-version }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ matrix.node-version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ matrix.node-version }}-alpine

  tag-latest:
    needs: [get-versions, build-and-push]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push latest
        uses: docker/build-push-action@v5
        with:
          context: .
          build-args: |
            NODE_VERSION=${{ needs.get-versions.outputs.latest }}
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

  cleanup:
    needs: tag-latest
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - name: Delete all untagged versions
        run: |
          # Fetch all versions of the package
          # Using the package name from the repository name
          PACKAGE_NAME=${{ github.event.repository.name }}
          
          echo "Cleaning up untagged versions for $PACKAGE_NAME..."
          
          VERSIONS=$(curl -s -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/users/${{ github.repository_owner }}/packages/container/$PACKAGE_NAME/versions")
          
          # Check if any untagged versions exist and delete them
          echo "$VERSIONS" | jq -c '.[] | select(.metadata.container.tags | length == 0) | .id' | while read id; do
            echo "Deleting untagged version ID: $id"
            curl -s -X DELETE -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              -H "Accept: application/vnd.github.v3+json" \
              "https://api.github.com/users/${{ github.repository_owner }}/packages/container/$PACKAGE_NAME/versions/$id"
          done
          
          echo "Cleanup complete."
