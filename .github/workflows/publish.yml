name: Publish All-in-One Node.js

on:
  push:
    branches: [ "main" ]
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  get-versions:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      latest: ${{ steps.set-matrix.outputs.latest }}
    steps:
      - id: set-matrix
        run: |
          DATA=$(curl -s https://nodejs.org/dist/index.json)
          # Get all major versions, but split 0 into 0.10 and 0.12
          MAJORS=$(echo $DATA | jq -c '[.[] | .version | capture("v(?<major>\\d+)") | .major | tonumber | select(. > 0)] | unique | sort')
          VERSIONS=$(echo $MAJORS | jq -c '["0.10", "0.12"] + .')
          LATEST=$(echo $DATA | jq -r '.[0].version | capture("v(?<major>\\d+)") | .major')
          echo "matrix=$VERSIONS" >> $GITHUB_OUTPUT
          echo "latest=$LATEST" >> $GITHUB_OUTPUT

  cleanup-before:
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - name: Neat Registry Cleanup
        run: |
          PACKAGE_NAME=${{ github.event.repository.name }}
          for page in {1..20}; do
            VERSIONS=$(curl -s -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              "https://api.github.com/users/${{ github.repository_owner }}/packages/container/$PACKAGE_NAME/versions?per_page=100&page=$page")
            if [ "$(echo "$VERSIONS" | jq '. | length')" -eq 0 ]; then break; fi
            echo "$VERSIONS" | jq -c '.[]' | while read -r version; do
              id=$(echo "$version" | jq -r '.id')
              tags=$(echo "$version" | jq -r '.metadata.container.tags')
              if [ "$tags" == "null" ] || [ "$tags" == "[]" ]; then
                echo "Deleting untagged ID: $id"
                curl -s -X DELETE -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
                  "https://api.github.com/users/${{ github.repository_owner }}/packages/container/$PACKAGE_NAME/versions/$id"
              fi
            done
          done

  build-and-push:
    needs: [get-versions, cleanup-before]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        node-version: ${{ fromJson(needs.get-versions.outputs.matrix) }}
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract full version
        id: meta
        run: |
          V="${{ matrix.node-version }}"
          DATA=$(curl -s https://nodejs.org/dist/index.json)
          if [[ "$V" == "0.10" || "$V" == "0.12" ]]; then
            FULL=$(echo $DATA | jq -r --arg prefix "v$V." '.[] | select(.version | startswith($prefix)) | .version' | head -n 1 | sed 's/v//')
          else
            FULL=$(echo $DATA | jq -r --arg major "v$V." '.[] | select(.version | startswith($major)) | .version' | head -n 1 | sed 's/v//')
          fi
          echo "full=$FULL" >> $GITHUB_OUTPUT

      - name: Determine Base Image
        id: base
        run: |
          V=$(echo "${{ matrix.node-version }}" | xargs)
          FULL="${{ steps.meta.outputs.full }}"
          case $V in
            0.10|0.12|5|7|9)
              echo "img=node:$FULL-slim" >> $GITHUB_OUTPUT
              ;;
            *)
              if [ "$V" -lt 4 ]; then
                echo "img=node:$FULL-slim" >> $GITHUB_OUTPUT
              else
                echo "img=node:$V-alpine" >> $GITHUB_OUTPUT
              fi
              ;;
          esac

      - name: Check Dev-Kit Eligibility
        id: devkit
        run: |
          V=$(echo "${{ matrix.node-version }}" | xargs)
          MAJOR=$(echo "$V" | cut -d. -f1)
          if [ "$MAJOR" -ge 18 ]; then
            echo "build=true" >> $GITHUB_OUTPUT
          else
            echo "build=false" >> $GITHUB_OUTPUT
          fi

      - name: Build Standard
        uses: docker/build-push-action@v5
        with:
          context: .
          build-args: |
            BASE_IMAGE=${{ steps.base.outputs.img }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ matrix.node-version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.full }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ matrix.node-version }}-base

      - name: Build Dev-Kit
        if: steps.devkit.outputs.build == 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          build-args: |
            BASE_IMAGE=${{ steps.base.outputs.img }}
            DEV_MODE=true
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ matrix.node-version }}-dev
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.full }}-dev

  tag-latest:
    needs: [get-versions, build-and-push]
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Determine Base Image
        id: base
        run: |
          V=${{ needs.get-versions.outputs.latest }}
          echo "img=node:$V-alpine" >> $GITHUB_OUTPUT
      - name: Build and push latest
        uses: docker/build-push-action@v5
        with:
          context: .
          build-args: |
            BASE_IMAGE=${{ steps.base.outputs.img }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest-base

  update-assets:
    needs: [get-versions, build-and-push]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Update Dockerfile and README
        run: |
          VERSIONS='${{ needs.get-versions.outputs.matrix }}'
          LATEST='${{ needs.get-versions.outputs.latest }}'
          REPO="${{ github.repository }}"
          sed -i "s|ARG BASE_IMAGE=.*|ARG BASE_IMAGE=node:$LATEST-alpine|" Dockerfile
          echo "# Node.js All-in-One Container 🚀" > README.md
          echo "![GitHub Workflow Status](https://img.shields.io/github/actions/workflow/status/$REPO/publish.yml?branch=main&style=for-the-badge) ![Security](https://img.shields.io/badge/Security-Trivy_Passed-green?style=for-the-badge&logo=armosecurity)" >> README.md
          echo "" >> README.md
          echo "Multi-version Docker containers for Node.js (Alpine/Slim). **v0.10 to v23+**." >> README.md
          echo "" >> README.md
          echo "## 🛠️ Dev-Kit (Developer Variant)" >> README.md
          echo "Varian dengan tools lengkap (\`git\`, \`curl\`, \`build-base\`) untuk mendukung kompilasi native. **Tersedia khusus untuk Node.js v18 ke atas (LTS/Current).**" >> README.md
          echo "" >> README.md
          echo "## 📦 Supported Versions" >> README.md
          echo "| Version | Image Tag | Dev-Kit | Base OS |" >> README.md
          echo "| :--- | :--- | :--- | :--- |" >> README.md
          echo $VERSIONS | jq -r '.[]' | sort -rn | while read v; do
            OS="Alpine"
            if [[ "$v" == "0.10" || "$v" == "0.12" || "$v" == "5" || "$v" == "7" || "$v" == "9" ]]; then OS="Slim (Debian)"; fi
            DEVKIT="N/A"
            MAJOR=$(echo "$v" | cut -d. -f1)
            if [ "$MAJOR" -ge 18 ]; then DEVKIT="\`$v-dev\` ✅"; fi
            echo "| **Node.js $v** | \`ghcr.io/$REPO:$v\` | $DEVKIT | $OS |" >> README.md
          done
          git config --global user.name "miuubyte"
          git config --global user.email "miuudev@gmail.com"
          git add README.md Dockerfile
          git commit -m "chore: sync assets [skip ci]" || exit 0
          git push

  cleanup:
    needs: [tag-latest, update-assets]
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - name: Final Cleanup
        run: |
          PACKAGE_NAME=${{ github.event.repository.name }}
          for page in {1..20}; do
            VERSIONS=$(curl -s -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              "https://api.github.com/users/${{ github.repository_owner }}/packages/container/$PACKAGE_NAME/versions?per_page=100&page=$page")
            if [ "$(echo "$VERSIONS" | jq '. | length')" -eq 0 ]; then break; fi
            echo "$VERSIONS" | jq -c '.[]' | while read -r version; do
              id=$(echo "$version" | jq -r '.id')
              tags=$(echo "$version" | jq -r '.metadata.container.tags')
              if [ "$tags" == "null" ] || [ "$tags" == "[]" ]; then
                curl -s -X DELETE -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
                  "https://api.github.com/users/${{ github.repository_owner }}/packages/container/$PACKAGE_NAME/versions/$id"
              fi
            done
          done
