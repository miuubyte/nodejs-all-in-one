name: Publish All-in-One Node.js

on:
  push:
    branches: [ "main" ]
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  get-versions:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      latest: ${{ steps.set-matrix.outputs.latest }}
    steps:
      - id: set-matrix
        run: |
          DATA=$(curl -s https://nodejs.org/dist/index.json)
          # Get ALL versions from v0.x onwards
          VERSIONS=$(echo $DATA | jq -c '[.[] | .version | capture("v(?<major>\\d+)") | .major | tonumber] | unique | sort')
          LATEST=$(echo $DATA | jq -r '.[0].version | capture("v(?<major>\\d+)") | .major')
          echo "matrix=$VERSIONS" >> $GITHUB_OUTPUT
          echo "latest=$LATEST" >> $GITHUB_OUTPUT

  build-and-push:
    needs: get-versions
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 1
      matrix:
        node-version: ${{ fromJson(needs.get-versions.outputs.matrix) }}
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract full version
        id: meta
        run: |
          FULL=$(curl -s https://nodejs.org/dist/index.json | jq -r --arg major "${{ matrix.node-version }}" '.[] | select(.version | startswith("v"+$major+".")) | .version' | head -n 1 | sed 's/v//')
          echo "full=$FULL" >> $GITHUB_OUTPUT

      - name: Determine Base Image
        id: base
        run: |
          V=${{ matrix.node-version }}
          if [ "$V" -lt 4 ]; then
            echo "img=node:$V-slim" >> $GITHUB_OUTPUT
          else
            echo "img=node:$V-alpine" >> $GITHUB_OUTPUT
          fi

      - name: Build Standard
        uses: docker/build-push-action@v5
        with:
          context: .
          build-args: |
            BASE_IMAGE=${{ steps.base.outputs.img }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ matrix.node-version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.full }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ matrix.node-version }}-base

      - name: Build Dev-Kit
        uses: docker/build-push-action@v5
        with:
          context: .
          build-args: |
            BASE_IMAGE=${{ steps.base.outputs.img }}
            DEV_MODE=true
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ matrix.node-version }}-dev
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.full }}-dev

  tag-latest:
    needs: [get-versions, build-and-push]
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Determine Base Image
        id: base
        run: |
          V=${{ needs.get-versions.outputs.latest }}
          if [ "$V" -lt 4 ]; then
            echo "img=node:$V-slim" >> $GITHUB_OUTPUT
          else
            echo "img=img=node:$V-alpine" >> $GITHUB_OUTPUT
          fi
      - name: Build and push latest
        uses: docker/build-push-action@v5
        with:
          context: .
          build-args: |
            BASE_IMAGE=${{ steps.base.outputs.img }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest-base

  update-assets:
    needs: get-versions
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Update Dockerfile and README
        run: |
          VERSIONS='${{ needs.get-versions.outputs.matrix }}'
          LATEST='${{ needs.get-versions.outputs.latest }}'
          REPO="${{ github.repository }}"
          
          sed -i "s/ARG NODE_VERSION=.*/ARG NODE_VERSION=$LATEST/" Dockerfile
          
          echo "# Node.js All-in-One Container 🚀" > README.md
          echo "![GitHub Workflow Status](https://img.shields.io/github/actions/workflow/status/$REPO/publish.yml?branch=main&style=for-the-badge) ![Security](https://img.shields.io/badge/Security-Trivy_Passed-green?style=for-the-badge&logo=armosecurity)" >> README.md
          echo "" >> README.md
          echo "Multi-version Docker containers for Node.js (Alpine Linux). **LTS + Current versions** with automated security scanning." >> README.md
          echo "" >> README.md
          echo "## 🛠️ Dev-Kit (Developer Variant)" >> README.md
          echo "Selain image standar yang ringan (Alpine), kami juga menyediakan varian **Dev-Kit** untuk setiap versi." >> README.md
          echo "" >> README.md
          echo "- **Tag Format**: \`ghcr.io/$REPO:X-dev\` (contoh: \`18-dev\`)" >> README.md
          echo "- **Isi**: Sudah terinstall \`git\`, \`curl\`, \`build-base\`, \`python3\`, dan \`autoconf\`." >> README.md
          echo "- **Kegunaan**: Sangat membantu developer yang perlu mem-build library native (misal: \`node-gyp\`) atau butuh tools tambahan di dalam container." >> README.md
          echo "" >> README.md
          echo "## 📦 Supported Versions" >> README.md
          echo "" >> README.md
          echo "| Node.js Version | Container Image Tag | Status |" >> README.md
          echo "| :--- | :--- | :--- |" >> README.md
          
          echo $VERSIONS | jq -r '.[]' | sort -rn | while read v; do
            STATUS="Stable"
            if [ "$v" == "$LATEST" ]; then STATUS="**Latest** 🌟"; fi
            echo "| **Node.js $v** | \`ghcr.io/$REPO:$v\` | $STATUS |" >> README.md
          done
          
          echo "" >> README.md
          echo "## 🚀 Quick Usage" >> README.md
          echo "\`\`\`bash" >> README.md
          echo "docker pull ghcr.io/$REPO:latest" >> README.md
          echo "\`\`\`" >> README.md
          echo "" >> README.md
          echo "---" >> README.md
          echo "*This README is automatically updated by GitHub Actions.*" >> README.md
          
          git config --global user.name "miuubyte"
          git config --global user.email "miuudev@gmail.com"
          git add README.md Dockerfile
          git commit -m "chore: update assets with dev-kit explanation [skip ci]" || exit 0
          git push

  cleanup:
    needs: [tag-latest, update-assets]
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - name: Aggressive Cleanup
        run: |
          PACKAGE_NAME=${{ github.event.repository.name }}
          # Delete all untagged versions and orphaned SHA256 layers
          for page in {1..20}; do
            VERSIONS=$(curl -s -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              "https://api.github.com/users/${{ github.repository_owner }}/packages/container/$PACKAGE_NAME/versions?per_page=100&page=$page")
            if [ "$(echo "$VERSIONS" | jq '. | length')" -eq 0 ]; then break; fi
            echo "$VERSIONS" | jq -c '.[]' | while read -r version; do
              id=$(echo "$version" | jq -r '.id')
              tags=$(echo "$version" | jq -r '.metadata.container.tags')
              # Delete if untagged
              if [ "$tags" == "null" ] || [ "$tags" == "[]" ]; then
                echo "Deleting orphaned version ID: $id"
                curl -s -X DELETE -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
                  "https://api.github.com/users/${{ github.repository_owner }}/packages/container/$PACKAGE_NAME/versions/$id"
              fi
            done
          done
